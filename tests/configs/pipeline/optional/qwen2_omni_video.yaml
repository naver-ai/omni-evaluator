# Pipeline super-test config — HF Qwen2.5-Omni inference → builtin evaluation (VIDEO).
#
# A video variant of qwen2_omni_builtin.yaml — drives the whole pipeline with a video-modality
# benchmark. test_pipeline.py runs evaluate.main() in-process with these values and verifies,
# in a modality-aware way, that the data-resolve stage unpacks video items to local files.
#
# The dataset local root (LOCAL_DATA_DIR), output/cache (tmp), and debug are injected by the test.
# The benchmark is chosen so the builtin task config's video_dirpath matches the actual data.
# (chatbench_..._video has a video/audio_dirpath in its config that does not match the data layout.)
# postprocess multichoice uses gpt-4o-mini, so OPENAI_API_KEY is required (present in .env.test).

inference_engine: "huggingface"
evaluation_engine: "builtin"
model_name_or_path: "Qwen/Qwen2.5-Omni-3B"
exp_name: "pipeline_qwen2_omni_video"

# video-input benchmark (input_modality: [text, video], target_metric: exact_match)
benchmarks: "music_avqa_test"
evaluation_methods: "generation"

torch_dtype: "float16"
device_map: "auto"
max_new_tokens: 4096
trust_remote_code: true

do_async: true
# Video frames cost more tokens/memory, so use a more conservative batch than for images.
inference_concurrency: 4
