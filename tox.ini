[tox]
requires =
    tox>=4
    tox-uv>=1
# ── Minimized environments (from E2E compatibility testing) ───────────────────────
#   omni_tf457 = ENV-A : base models × {builtin, lmms_eval, lm_eval, vlmeval} × submodule data
#                        co-installed in one venv (transformers >=4.57,<5)
#   omni_tf444 = ENV-B : dedicated models (emu3 / janus_pro / deepseek_vl)  (transformers ==4.44.0)
#   omni_vllm  = ENV-C : (optional) vLLM serving backend. Excluded from env_list — run `tox -e omni_vllm` if needed
# transformers is the only split axis: all BASE + all eval engines + all submodules co-exist on <5,
# only the 3 dedicated models are isolated on 4.44. (8 envs → 2 + 1 optional)
env_list =
    omni_tf457
    omni_tf444
work_dir = {env:TOX_WORK_DIR:/mnt/tmp/.tox-omni}


[commands]
# opencv-python-headless: avoids the libGL.so.1 system dependency (no apt needed)
opencv = uv pip install opencv-python-headless
# Eval-engine installs pull in transformers 5.x, so re-pin to <5 *after* installing the engines.
pin_tf457 = uv pip install "transformers>=4.57,<5"
clone_janus = bash -c 'test -d {tox_root}/submodules/Janus || ( git clone https://github.com/deepseek-ai/Janus {tox_root}/submodules/Janus && git -C {tox_root}/submodules/Janus checkout 1daa72fa409002d40931bd7b36a9280362469ead )'
clone_deepseek_vl = bash -c 'test -d {tox_root}/submodules/DeepSeek-VL || ( git clone https://github.com/deepseek-ai/DeepSeek-VL {tox_root}/submodules/DeepSeek-VL && git -C {tox_root}/submodules/DeepSeek-VL checkout 681bffb4519856ad27cc17531aacde31ddf6f1a7 )'
clone_emu3 = bash -c 'test -d {tox_root}/submodules/Emu3 || ( git clone https://github.com/baaivision/Emu3 {tox_root}/submodules/Emu3 && git -C {tox_root}/submodules/Emu3 checkout 9d0ae34f766e017dc81e19bed9cf2c3b0ec82086 )'
clone_lmms_eval = bash -c 'test -d {tox_root}/submodules/lmms-eval || ( git clone https://github.com/EvolvingLMMs-Lab/lmms-eval {tox_root}/submodules/lmms-eval && git -C {tox_root}/submodules/lmms-eval checkout 540724a5250672b03dc6a6b4b38cff39d5868eb6 )'
clone_lm_eval = bash -c 'test -d {tox_root}/submodules/lm-evaluation-harness || ( git clone https://github.com/EleutherAI/lm-evaluation-harness {tox_root}/submodules/lm-evaluation-harness && git -C {tox_root}/submodules/lm-evaluation-harness checkout d800e04dcb1ce96791d8b2926cf0cc7703d58457 )'
clone_vlm_eval = bash -c 'test -d {tox_root}/submodules/VLMEvalKit || ( git clone https://github.com/open-compass/VLMEvalKit {tox_root}/submodules/VLMEvalKit && git -C {tox_root}/submodules/VLMEvalKit checkout 00804217f868058f871f5ff252a7b9623c3475d9 )'


[testenv]
runner = uv-venv-runner
package = editable
extras = test
set_env =
    UV_CACHE_DIR = {env:UV_CACHE_DIR:/mnt/tmp/.uv-cache}
pass_env =
    CUDA_VISIBLE_DEVICES
    HF_HUB_CACHE
    HF_MODEL_ID
    HF_TOKEN
    HUGGINGFACE_HUB_CACHE
    LOCAL_DATA_DIR
    OPENAI_API_KEY
    TAU2_DATA_DIR
allowlist_externals =
    bash
    cp
    git
    uv
commands_pre =
    {[commands]opencv}
commands =
    pytest {posargs}


# ── ENV-A : omni_tf457 (modern) ───────────────────────────────────────────────────
# Co-installs base models (hyperclovax_vision, qwen2_vl, qwen2_omni, qwen3(_omni), whisper_v3, voxtral)
# + the 4 eval engines (builtin/lmms_eval/lm_eval/vlmeval) + submodule data (charxiv/voice_bench/
# tau-bench/tau2/MultimodalOCR) in one venv. transformers >=4.57,<5.
# Note: dedicated model packages (Janus/Emu3/DeepSeek-VL) are not installed → their adapter tests auto-skip.
[testenv:omni_tf457]
description = ENV-A: base models + builtin/lmms_eval/lm_eval/vlmeval + submodules (transformers >=4.57,<5)
extras =
    test
    voxtral
commands_pre =
    {[commands]clone_lmms_eval}
    uv pip install -e submodules/lmms-eval
    {[commands]clone_lm_eval}
    uv pip install -e "submodules/lm-evaluation-harness[ifeval,longbench,math,multilingual,ruler]"
    {[commands]clone_vlm_eval}
    uv pip install -e submodules/VLMEvalKit
    uv pip install "setuptools<81" --reinstall
    {[commands]opencv}
    {[commands]pin_tf457}
commands =
    # base unit tests
    pytest tests {posargs} --runslow

    # optional pipeline (formerly omni_tf452_pipelines) — hyperclovax_vision builtin
    pytest tests/pipelines/test_pipeline.py --pipeline-config=tests/configs/pipeline/optional/hyperclovax_vision_builtin.yaml {posargs} --runslow


# ── ENV-B : omni_tf444 (dedicated) ────────────────────────────────────────────────
# For dedicated models that cannot co-exist with the BASE stack. transformers==4.44.0, builtin only.
# Requires --low_cpu_mem_usage at runtime (tf4.44 device_map constraint) → the adapter tests set it.
# emu3 requires flash_attn → not usable on V100 (cc7.0), needs A100+ (cc>=8.0).
[testenv:omni_tf444]
description = ENV-B: emu3 / janus_pro / deepseek_vl on transformers==4.44.0
set_env =
    {[testenv]set_env}
    PYTORCH_CUDA_ALLOC_CONF = expandable_segments:True
commands_pre =
    {[commands]clone_janus}
    uv pip install -e submodules/Janus
    {[commands]clone_deepseek_vl}
    uv pip install -e submodules/DeepSeek-VL
    {[commands]clone_emu3}
    python -c "import sysconfig, pathlib; pathlib.Path(sysconfig.get_paths()['purelib'], 'emu3_local.pth').write_text(r'{tox_root}/submodules/Emu3')"
    uv pip install -U gradio
    uv pip install "huggingface-hub==0.36.2"
    uv pip install "transformers==4.44.0"
    {[commands]opencv}
commands =
    pytest \
        tests/inference/huggingface/huggingface_adapter/test_emu3.py \
        tests/inference/huggingface/huggingface_adapter/test_janus_pro.py \
        tests/inference/huggingface/huggingface_adapter/test_deepseek_vl.py \
        {posargs} --runslow


