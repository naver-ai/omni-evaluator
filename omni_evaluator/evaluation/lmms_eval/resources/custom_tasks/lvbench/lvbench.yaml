dataset_path: gwkrsrch2/lvbench
dataset_kwargs:
  token: True
  video: True
  cache_dir: lvbench
  custom_parquet_path: lvbench/test-00000-of-00001-b27242e870ecc6da.parquet
task: "lvbench"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.lvbench_doc_to_visual
