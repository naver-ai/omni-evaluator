meta:
  benchmark_name: "fleurs"
  split: "zh2en_test"
  lang: "zh"
  input_modality: ["audio", "text"]
  output_modality: ["text"]
  task_type: ["speech_translation"]
  subtask_type: ["asr"]
dataset:
  source: "huggingface_hub"
  path: "google/fleurs"
  name: ["cmn_hans_cn", "en_us"]
  split: "test"
  combine:
    method: "join"
    key: "id"
  audio_decode: false
  audio_column: ["audio"]
prompts:
  direct:
    system_prompt:
    task_prompt:
  reasoning:
    system_prompt:
    task_prompt:
inference:
  generation_options:
    max_new_tokens: 1024
postprocess:
  asr: {}
evaluation:
  method: "generation"
  target_metrics:
    text_evaluator:
      bleu:
        do_normalize: true
      comet:
        do_normalize: true
      wer:
        do_normalize: true
      cer:
        do_normalize: true
    judge_evaluator:
      judge_binary:
        lang: "en"
        judge_model: "gpt-5-mini"
        max_tokens: 1024
        temperature: 0.0
        seed: 42
        do_async: true
  display_metrics: ["bleu", "comet", "wer", "cer", "judge_binary"]
