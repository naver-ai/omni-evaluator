meta:
  benchmark_name: "kmmstar"
  split: "validation"
  lang: "ko"
  input_modality: ["image", "text"]
  output_modality: ["text"]
  task_type: ["visual_question_answering"]
  subtask_type: ["multiple_choice"]
dataset:
  source: "huggingface_hub"
  path: "NCSOFT/K-MMStar"
  split: "val"
prompts:
  direct:
    system_prompt:
    task_prompt:
  reasoning:
    system_prompt:
    task_prompt:
inference:
  generation_options:
    max_new_tokens: 16
postprocess:
  direct:
    pipeline: ['multichoice']
  reasoning:
    pipeline: ['think', 'multichoice']
evaluation:
  method: "generation"
  target_metrics:
    text_evaluator:
      exact_match: {}
  display_metrics: ["exact_match"]
