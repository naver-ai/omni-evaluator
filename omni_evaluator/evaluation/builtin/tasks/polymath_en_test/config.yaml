meta:
  benchmark_name: "polymath_en"
  split: "test"
  lang: "en"
  input_modality: ["text"]
  output_modality: ["text"]
  task_type: ["unknown"]
  subtask_type: ["math"]
dataset:
  source: "huggingface_hub"
  path: "Qwen/PolyMath"
  name: "en"
  # PolyMath splits are difficulty tiers, not train/test. Concatenate all four
  # so the task covers the full English set; the source split is preserved per
  # row under meta.category (via the loader-added ``dataset_split`` column) for
  # group metrics.
  split: ["top", "high", "medium", "low"]
  combine:
    method: "concatenate"
prompts:
  direct:
    system_prompt:
    task_prompt: "{}\nPlease put your final answer within \\boxed{{}}."
  reasoning:
    system_prompt:
    task_prompt: "{}\nPlease reason step by step, and put your final answer within
      \\boxed{{}}."
inference:
  direct:
    generation_options:
      max_new_tokens: 2048
  reasoning:
    generation_options:
      max_new_tokens: 16384
postprocess:
  direct:
    pipeline: ['boxed']
  reasoning:
    pipeline: ['think', 'boxed']
evaluation:
  method: "generation"
  do_normalize: true
  target_metrics:
    text_evaluator:
      exact_match: {}
  display_metrics: ["exact_match"]
