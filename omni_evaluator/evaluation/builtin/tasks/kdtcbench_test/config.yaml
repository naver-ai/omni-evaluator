meta:
  benchmark_name: "kdtcbench"
  split: "test"
  lang: "ko"
  input_modality: ["image", "text", ]
  output_modality: ["text", ]
  task_type: ["visual_question_answering", ]
  subtask_type: ["multiple_choice", ]
dataset:
  source: "huggingface_hub"
  path: "NCSOFT/K-DTCBench"
  split: "test"
prompts:
  direct:
    system_prompt:
    task_prompt: "{}\n주어진 선택지 중에서 정답에 해당하는 보기의 알파벳(문자)만 그대로 답하세요."
  reasoning:
    system_prompt:
    task_prompt: "{}\n주어진 선택지 중에서 정답에 해당하는 보기의 알파벳(문자)만 그대로 답하세요. 단계별로 추론하고, 최종 답은 \\boxed{} 안에 정답 알파벳(문자)으로 적어주세요."
inference:
  generation_options:
    max_new_tokens: 64
postprocess:
  direct:
    pipeline: ['multichoice', ]
  reasoning:
    pipeline: ['think', 'multichoice', ]
evaluation:
  method: "generation"
  target_metrics:
    text_evaluator:
      exact_match: {}
  display_metrics: ["exact_match", ]
