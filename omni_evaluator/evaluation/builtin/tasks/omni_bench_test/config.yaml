meta:
  benchmark_name: "omni_bench"
  split: "test"
  lang: "en"
  input_modality: ["audio", "image", "text"]
  output_modality: ["text"]
  task_type: ["visual_question_answering"]
  subtask_type: ["multiple_choice"]
dataset:
  source: "huggingface_hub"
  path: "m-a-p/OmniBench"
  split: "train"
  audio_decode: false
prompts:
  direct:
    system_prompt:
    # paper-strict (aligned with lmms-eval omni_bench utils.py:18).
    # custom.py:sample_to_record builds `_query = f"Question:\n{question}"`,
    # so the instruction comes last (layout: Question -> Options -> instruction).
    task_prompt: "{query}\n\nOptions:\n{option_contents}\n\nAnswer with the option's
      letter from the given choices directly."
  reasoning:
    system_prompt:
    task_prompt: "{query}\n\nOptions:\n{option_contents}\n\nAnswer with the option's
      letter from the given choices directly."
inference:
  config:
    audio: true
    audio_transcript: false
    image: true
    image_caption: false
  generation_options:
    max_new_tokens: 4096
postprocess:
  direct: {}
  reasoning:
    pipeline: ['think']
evaluation:
  method: "generation"
  target_metrics:
    text_evaluator:
      exact_match: {}
