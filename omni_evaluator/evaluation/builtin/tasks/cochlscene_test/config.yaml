meta:
  benchmark_name: "cochlscene"
  split: "test"
  lang: "ko"
  input_modality: ["audio", "text"]
  output_modality: ["text"]
  task_type: ["audio_understanding"]
  subtask_type: ["audio_scene"]
dataset:
  source: "huggingface_hub"
  path: "Kyudan/CochlScene-test"
  split: "train"
  audio_decode: false
  audio_column: ["audio"]
prompts:
  direct:
    system_prompt:
    # CochlScene is scored by content `mmau_string_match`, not letter EM — the
    # choices are shown as scene names (no letters), so the model must answer
    # the scene NAME, not an option letter.
    task_prompt: "{query}\nAnswer with the acoustic scene name from the given choices
      directly."
  reasoning:
    system_prompt:
    task_prompt: "{query}\nAnswer with the acoustic scene name from the given choices
      directly."
inference:
  generation_options:
    max_new_tokens: 64
postprocess:
  direct: {}
  reasoning:
    pipeline: ['think']
evaluation:
  method: "generation"
  target_metrics:
    text_evaluator:
      mmau_string_match: {}
      exact_match: {}
    judge_evaluator:
      judge_binary:
        lang: "en"
        judge_model: "gpt-5-mini"
        max_tokens: 1024
        temperature: 0.0
        seed: 42
        do_async: true
  display_metrics: ["mmau_string_match", "exact_match", "judge_binary"]
