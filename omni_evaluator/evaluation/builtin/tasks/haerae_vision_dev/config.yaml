meta:
  benchmark_name: "haerae_vision"
  split: "dev"
  lang: "ko"
  input_modality: ["image", "text", ]
  output_modality: ["text", ]
  task_type: ["visual_question_answering", ]
  subtask_type: ["reasoning", ]
dataset:
  source: "huggingface_hub"
  path: "HAERAE-HUB/HAERAE-VISION"
  split: "train"
  # Upstream dataset_infos.json has stale split counts (165 cached vs 653 live);
  # skip verification so it loads correctly.
  verification_mode: "no_checks"
prompts:
  direct:
    system_prompt:
    task_prompt:
  reasoning:
    system_prompt:
    task_prompt:
inference:
  config:
    question_type: "original"
  generation_options:
    max_new_tokens: 4096
evaluation:
  method: "generation"
  target_metrics:
    judge_evaluator:
      judge_rating:
        lang: "en"
        judge_model: "gpt-5-mini"
  display_metrics: ["judge_rating", ]
