meta:
  benchmark_name: "vocal_sound"
  split: "test"
  lang: "en"
  input_modality: ["audio", "text"]
  output_modality: ["text"]
  task_type: ["audio_understanding"]
  subtask_type: ["audio_scene"]
dataset:
  source: "huggingface_hub"
  path: "lmms-lab/vocalsound"
  split: "test"
  trust_remote_code: true
  audio_decode: false
  audio_column: ["audio"]
prompts:
  direct:
    system_prompt:
    task_prompt: "{}\nAnswer with the option's letter from the given choices directly."
  reasoning:
    system_prompt:
    task_prompt:
inference:
  generation_options:
    max_new_tokens: 64
postprocess:
  direct: {}
  reasoning:
    pipeline: ['think']
evaluation:
  method: "generation"
  target_metrics:
    text_evaluator:
      exact_match: {}
    judge_evaluator:
      judge_binary:
        lang: "en"
        judge_model: "gpt-5-mini"
        max_tokens: 1024
        temperature: 0.0
        seed: 42
        do_async: true
  display_metrics: ["exact_match", "judge_binary"]
