task: kobalt_generative
dataset_path: snunlp/KoBALT-700
test_split: raw
output_type: generate_until
doc_to_text: "다음 객관식 문제에 답하세요. 응답의 마지막 줄은 다음 형식이어야 합니다: '정답: A/B/C/D/E/F/G/H/I/J' (예: '정답: A').\n\n{{Question}}"
doc_to_target: "{{Answer}}"
filter_list:
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: -1
        regex_pattern: "정답은\\s*[\\'\\*]*\\(?([A-J])\\)?[\\'\\*]*|답은\\s*[\\'\\*]*\\(?([A-J])\\)?[\\'\\*]*|정답:\\s*[\\'\\*]*\\(?([A-J])\\)?[\\'\\*]*|답:\\s*[\\'\\*]*\\(?([A-J])\\)?[\\'\\*]*|([A-J]):\\s|([A-J])\\)\\s|[Aa]:\\s*\\(?([A-J])\\)?|[\\'\\*]*\\(?([A-J])\\)?[\\'\\*]*.+[은는이가]\\s*올바른|[\\'\\*]*\\(?([A-J])\\)?[\\'\\*]*.+[은는이가]\\s*정답|\\boxed\\{\\(?([A-J])\\)?\\}|[^a-zA-Z0-9]([A-J])[^a-zA-Z0-9]|^\\s*([A-J])\\s*$"
generation_kwargs:
  until:
    - "</s>"
    - "Question:"
  do_sample: true
  max_gen_toks: 8192
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
dataset_kwargs:
  trust_remote_code: true
metadata:
  version: 2.0